# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
	${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "2x1poc-layer"
BBFILE_PATTERN_2x1poc-layer = "^${LAYERDIR}/"
BBFILE_PRIORITY_2x1poc-layer = "6"

LAYERSERIES_COMPAT_2x1poc-layer = "langdale mickledore"
