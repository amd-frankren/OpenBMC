# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "sp7-layer"
BBFILE_PATTERN_sp7-layer := "^${LAYERDIR}/"
BBFILE_PRIORITY_sp7-layer = "6"

LAYERSERIES_COMPAT_sp7-layer = "nanbield scarthgap"
